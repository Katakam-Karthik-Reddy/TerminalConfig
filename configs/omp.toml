console_title_template = '{{ .Shell }} in {{ .Folder }}'
version = 4
final_space = true

[[blocks]]
    type = 'prompt'
    alignment = 'left'
    newline = true

    [[blocks.segments]]
        type = 'path'
        style = 'plain'
        background = 'transparent'
        foreground = 'grey'
        template = "{{ .UserName }}@{{ .HostName }}: {{ .Path }}"

        [blocks.segments.properties]
            style = 'full'

[[blocks]]
    type = 'prompt'
    alignment = 'left'
    newline = true

    [[blocks.segments]]
        type = 'text'
        style = 'plain'
        background = 'transparent'
        foreground_templates = [
            "{{if gt .Code 0}}red{{end}}",
            "{{if eq .Code 0}}white{end}}",
        ]
        template = ">"

[transient_prompt]
    background = 'transparent'
    foreground_templates = [
        "{{if gt .Code 0}}red{{end}}",
        "{{if eq .Code 0}}white{end}}",
    ]
    template = '> '
